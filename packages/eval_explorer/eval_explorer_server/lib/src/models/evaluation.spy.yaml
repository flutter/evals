### Result of evaluating one sample.
class: Evaluation
table: evals_evaluations
fields:
  id: UuidValue?, defaultPersist=random_v7

  ### The parent run.
  run: Run?, relation(onDelete=Cascade)

  ### The parent task.
  task: Task?, relation(onDelete=Cascade)

  ### The sample that was evaluated.
  sample: Sample?, relation(onDelete=Cascade)

  ### The model that was evaluated.
  model: Model?, relation(onDelete=Cascade)

  ### The dataset this sample belongs to (e.g., "flutter_qa_dataset").
  dataset: Dataset?, relation(onDelete=Cascade)

  ### Variant configuration.
  variant: List<Variant>

  ### The actual output generated by the model.
  output: String

  ### Tool calls made during evaluation.
  toolCalls: List<ToolCallData>

  ### Number of times this sample was retried.
  retryCount: int

  ### Error message if sample failed.
  error: String?

  ### True if all retries failed (exclude from accuracy calculations).
  neverSucceeded: bool

  ### Total time for this sample in seconds.
  durationSeconds: double
  
  # Scorer Metadata

  ### Did flutter analyze pass?
  analyzerPassed: bool?

  ### Number of tests passed.
  testsPassed: int?

  ### Total number of tests.
  testsTotal: int?

  ### Code structure validation score (0.0-1.0).
  structureScore: double?

  ### Categorized failure reason: "analyzer_error", "test_failure", "missing_structure".
  failureReason: String?

  # Token Usage

  ### Input tokens for this sample.
  inputTokens: int

  ### Output tokens for this sample.
  outputTokens: int

  ### Reasoning tokens for this sample.
  reasoningTokens: int

  ### When this evaluation was run.
  createdAt: DateTime, default=now

indexes:
  evals_evaluation_run_id_idx:
    fields: runId
  evals_evaluation_task_id_idx:
    fields: taskId
  evals_evaluation_sample_id_idx:
    fields: sampleId
  evals_evaluation_model_id_idx:
    fields: modelId
  evals_evaluation_dataset_id_idx:
    fields: datasetId
  evals_evaluation_created_at_idx:
    fields: createdAt