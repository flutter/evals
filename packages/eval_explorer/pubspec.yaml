name: eval_explorer
publish_to: none
description: Eval Explorer - a web app for exploring evaluation results.
version: 1.0.0

environment:
  sdk: ^3.10.0

workspace:
  - eval_explorer_client
  - eval_explorer_flutter
  - eval_explorer_server
  - eval_explorer_shared

dependencies:
  ansicolor: ^2.0.3
  args: ^2.7.0
  cupertino_icons: ^1.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  go_router: ^17.0.1
  json_annotation: ^4.9.0
  logging: ^1.3.0
  meta: ^1.17.0
  path: ^1.9.1
  provider: ^6.1.5+1
  serverpod: ^3.2.0
  serverpod_auth_idp_client: ^3.2.0
  serverpod_auth_idp_flutter: ^3.2.0
  serverpod_auth_idp_server: ^3.2.0
  serverpod_client: ^3.2.0
  serverpod_flutter: ^3.2.0
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.10.4
  freezed: ^3.2.4
  json_serializable: ^6.11.3
  lints: ^6.0.0
  mocktail: ^1.0.4
  serverpod_test: ^3.2.0
  test: ^1.28.0
