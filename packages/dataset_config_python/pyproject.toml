[project]
name = "dataset-config-python"
version = "0.1.0"
description = "Configuration resolver for dash-evals: reads YAML configs and produces EvalSet JSON."
authors = [{ name = "Eric Windmill", email = "eric@ericwindmill.com" }]
readme = "README.md"
requires-python = ">=3.13,<4.0.0"
dependencies = [
    "pyyaml>=6.0.3,<7.0.0",
    "pydantic>=2.0.0,<3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-mock>=3.12.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]
