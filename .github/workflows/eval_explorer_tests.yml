name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VERSION: '3.1.1'
      SERVERPOD_PASSWORD_database: 'bSHGKL1oWXcZpXxDyx7m0B-ONg-xo-Tl'
      SERVERPOD_PASSWORD_redis: 'onSS_GYAL4GwJsARIM_-iOS2c5P5A7Ky'

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'

      - name: Start containers
        working-directory: packages/eval_explorer/eval_explorer_server
        run: docker compose up --build -d

      - name: Install dependencies
        working-directory: packages/eval_explorer/eval_explorer_server
        run: dart pub get

      - name: Install Serverpod CLI
        working-directory: packages/eval_explorer/eval_explorer_server
        run: dart pub global activate serverpod_cli $VERSION

      - name: Run Serverpod generator
        working-directory: packages/eval_explorer/eval_explorer_server
        run: serverpod generate

      - name: Run tests
        working-directory: packages/eval_explorer/eval_explorer_server
        run: dart test

      - name: Stop containers
        if: always()
        working-directory: packages/eval_explorer/eval_explorer_server
        run: docker compose down -v
