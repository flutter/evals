name: Eval Explorer Tests

on:
  pull_request:
    paths:
      - 'packages/eval_explorer/**'
      - '.github/workflows/eval_explorer_tests.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/eval_explorer/**'
      - '.github/workflows/eval_explorer_tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Start containers
        working-directory: packages/eval_explorer/eval_explorer_server
        run: docker compose up --build -d

      - name: Install dependencies
        working-directory: packages/eval_explorer
        run: flutter pub get

      - name: Install Serverpod CLI
        run: dart pub global activate serverpod_cli

      - name: Run Serverpod generator
        working-directory: packages/eval_explorer/eval_explorer_server
        run: serverpod generate

      - name: Run tests
        working-directory: packages/eval_explorer/eval_explorer_server
        run: dart test

      - name: Stop containers
        if: always()
        working-directory: packages/eval_explorer/eval_explorer_server
        run: docker compose down -v
